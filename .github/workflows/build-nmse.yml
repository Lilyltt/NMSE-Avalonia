# --------------------------------------------------------------
# NMSE Release Build Workflow
# Builds, tests, publishes (Native AOT), and creates a GitHub
# Release whenever version.json is updated on the default branch.
#
# The publish step produces a fully self-contained, trimmed,
# Native AOT executable - users do not need .NET installed.
#
# Each release is tagged with a semantic version (e.g. v1.2.3)
# derived from version.json.  The release body is read from
# release-notes.md in the repo root.
#
# All actions are pinned to immutable commit SHAs to mitigate
# supply-chain attacks.  When upgrading, update both the SHA
# and the version comment.
# --------------------------------------------------------------

name: Build NMSE

env:
  PROJECT_NAME: NMSE
  PROJECT_FILE: NMSE.csproj
  TEST_PROJECT_FILE: NMSE.Tests/NMSE.Tests.csproj
  DOTNET_VERSION: "10.0.x"
  BUILD_CONFIGURATION: Release

permissions:
  contents: write

on:
  # -- Un/comment the push block below to enable automated releases --
  push:
    paths:
      - "version.json"

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_FILE }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Restore test dependencies
        run: dotnet restore ${{ env.TEST_PROJECT_FILE }}

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --verbosity normal

      # Publish Native AOT: produces a self-contained, trimmed native executable.
      # This step re-builds with AOT compilation (ILC) and takes longer than the
      # managed build above, but the output requires no .NET runtime on the target.
      - name: Publish (Native AOT)
        if: success()
        run: dotnet publish ${{ env.PROJECT_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore
      
      # -- Publish artifacts ----------------------------------

      - name: Locate build zip
        if: success()
        id: find-zip
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path Build/bin -Filter "NMSE-*-${{ env.BUILD_CONFIGURATION }}.zip" |
                 Select-Object -First 1
          if (-not $zip) { Write-Error "No build zip found in Build/bin/"; exit 1 }
          "ZIP_PATH=$($zip.FullName)"  >> $env:GITHUB_OUTPUT
          "ZIP_NAME=$($zip.Name)"      >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.PROJECT_NAME }}-build
          path: ${{ steps.find-zip.outputs.ZIP_PATH }}
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    needs: build-win
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download win build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PROJECT_NAME }}-build

      - name: Unzip win build
        run: |
          winbuild="$(ls NMSE*.zip)"
          unzip "$winbuild" -d $GITHUB_WORKSPACE/win

      - name: Install Wine
        run: |
          sudo mkdir -pm755 /etc/apt/keyrings
          wget -O - https://dl.winehq.org/wine-builds/winehq.key | sudo gpg --dearmor -o /etc/apt/keyrings/winehq-archive.key -
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/questing/winehq-questing.sources
          sudo apt update
          sudo apt install winehq-stable --no-install-recommends -y

      - name: Run build-appimage script
        id: appimage
        run: |
          sudo chmod +x ./scripts/linux/build-appimage.sh
          WIN_DIR="$GITHUB_WORKSPACE/win"
          OUTPUT_FILE="$GITHUB_WORKSPACE/NMSE-x64.AppImage"
          scripts/linux/build-appimage.sh "$WIN_DIR" "$OUTPUT_FILE"
          echo "APPIMAGE_PATH=$OUTPUT_FILE" >> $GITHUB_OUTPUT
      
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.PROJECT_NAME }}-Wine-AppImage
          path: ${{ steps.appimage.outputs.APPIMAGE_PATH }}
          if-no-files-found: error

  release:
    runs-on: windows-latest
    needs: build-linux
    steps:  
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download WinBuild
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PROJECT_NAME }}-build        

      - name: Download AppImage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PROJECT_NAME }}-Wine-AppImage

      - name: Read version from version.json
        id: version
        shell: pwsh
        run: |
          $v = Get-Content version.json | ConvertFrom-Json
          $ver = "$($v.major).$($v.minor).$($v.patch)"
          "VERSION=$ver"     >> $env:GITHUB_OUTPUT
          "TAG=v$ver"        >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver  Tag: v$ver"
          
      - name: Build release notes
        if: success()
        id: notes
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.VERSION }}"
          $sha  = "${{ github.sha }}"
          $run  = "${{ github.run_number }}"

          # Start with release-notes.md template (if it exists)
          $body = ""
          if (Test-Path "release-notes.md") {
            $body = (Get-Content "release-notes.md" -Raw).Trim()
          }

          # Append build metadata
          $meta = "`n`n---`n`n*Automated release **v${ver}** (build #${run}) from ``${sha}``*"
          $body = ($body + $meta).Trim()

          # Write to a temp file for gh release --notes-file
          $body | Out-File release-body.md -Encoding utf8
          "NOTES_FILE=release-body.md" >> $env:GITHUB_OUTPUT

      - name: Create versioned release
        if: success()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $ver = "${{ steps.version.outputs.VERSION }}"

          # Rename AppImage to match win build
          Rename-Item -Path "NMSE-x64.AppImage" -NewName "NMSE-${{ steps.version.outputs.VERSION }}-${{ env.BUILD_CONFIGURATION}}-x64.AppImage"

          # Check whether this version tag already exists
          $existing = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists — deleting to recreate"
            gh release delete $tag --yes --cleanup-tag
          }

          # Create a new release tagged with the semantic version
          gh release create $tag `
            "*.zip" "*.AppImage"`
            --title "NMSE v${ver}" `
            --notes-file "${{ steps.notes.outputs.NOTES_FILE }}"
          
